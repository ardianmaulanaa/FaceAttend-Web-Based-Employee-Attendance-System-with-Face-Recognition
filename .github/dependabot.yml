version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      test-tooling:
        patterns:
          - "vitest"
          - "@vitest/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
